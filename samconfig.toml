# SAM CLI configuration file
# Usage: sam deploy --config-env dev | qa | prod
version = 0.1

# ============================================================
# DEV ENVIRONMENT
# ============================================================
[dev.deploy.parameters]
stack_name = "dev-sftp-malware-router"
region = "us-east-1"
confirm_changeset = true
capabilities = "CAPABILITY_NAMED_IAM"
parameter_overrides = [
    "Environment=dev",
    "CleanBucketName=healthworks-lambda-manage-productionencounterbucke-yoqwb36evr2x",
    "AlertEmail=your-dev-team@champsoft.com",
    "AuthorizedUserArns=arn:aws:iam::744640651507:user/kasuns@champsoft.com,arn:aws:iam::744640651507:user/umesh@champsoft.com,arn:aws:iam::744640651507:user/naduni@champsoft.com"
]
tags = "Environment=dev Project=healthworks-sftp"

# ============================================================
# QA ENVIRONMENT
# ============================================================
[qa.deploy.parameters]
stack_name = "qa-sftp-malware-router"
region = "us-east-1"
confirm_changeset = true
capabilities = "CAPABILITY_NAMED_IAM"
parameter_overrides = [
    "Environment=qa",
    "CleanBucketName=REPLACE-WITH-QA-CLEAN-BUCKET",
    "AlertEmail=REPLACE-WITH-QA-ALERT-EMAIL",
    "AuthorizedUserArns=REPLACE-WITH-QA-AUTHORIZED-ARNS"
]
tags = "Environment=qa Project=healthworks-sftp"

# ============================================================
# PROD ENVIRONMENT
# ============================================================
[prod.deploy.parameters]
stack_name = "prod-sftp-malware-router"
region = "us-east-1"
confirm_changeset = true
capabilities = "CAPABILITY_NAMED_IAM"
parameter_overrides = [
    "Environment=prod",
    "CleanBucketName=REPLACE-WITH-PROD-CLEAN-BUCKET",
    "AlertEmail=REPLACE-WITH-PROD-ALERT-EMAIL",
    "AuthorizedUserArns=REPLACE-WITH-PROD-AUTHORIZED-ARNS"
]
tags = "Environment=prod Project=healthworks-sftp"
