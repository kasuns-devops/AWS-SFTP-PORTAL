AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Healthworks SFTP Malware Router Pipeline
  Automated malware scanning and file routing for SFTP uploads.

# ============================================================
# PARAMETERS — Change per environment (dev / qa / prod)
# ============================================================
Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, qa, prod]
    Default: dev
    Description: Deployment environment name

  CleanBucketName:
    Type: String
    Description: Existing production/clean bucket name where safe files are routed

  AlertEmail:
    Type: String
    Description: Email address for malware detection alerts

  AuthorizedUserArns:
    Type: CommaDelimitedList
    Description: Comma-separated IAM ARNs allowed to access the quarantine bucket

Globals:
  Function:
    Timeout: 30
    Runtime: python3.12
    Architectures:
      - x86_64

# ============================================================
# RESOURCES
# ============================================================
Resources:

  # ----------------------------------------------------------
  # S3 BUCKETS
  # ----------------------------------------------------------
  InboundBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${Environment}-sftp-inbound-quarantine"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  InfectedBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${Environment}-sftp-infected-quarantine"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ----------------------------------------------------------
  # S3 BUCKET POLICIES
  # ----------------------------------------------------------
  CleanBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CleanBucketName
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !Sub "arn:aws:s3:::${CleanBucketName}"
              - !Sub "arn:aws:s3:::${CleanBucketName}/*"
            Condition:
              Bool:
                aws:SecureTransport: "false"
          - Sid: AllowMalwareRouterWrite
            Effect: Allow
            Principal:
              AWS: !GetAtt MalwareRouterRole.Arn
            Action:
              - s3:PutObject
              - s3:PutObjectTagging
              - s3:ListBucket
              - s3:GetBucketLocation
            Resource:
              - !Sub "arn:aws:s3:::${CleanBucketName}"
              - !Sub "arn:aws:s3:::${CleanBucketName}/*"

  InfectedBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref InfectedBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: RestrictAccessToAuthorizedRolesOnly
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !GetAtt InfectedBucket.Arn
              - !Sub "${InfectedBucket.Arn}/*"
            Condition:
              ArnNotLike:
                aws:PrincipalArn: !Split
                  - ","
                  - !Sub
                    - "${RoleArn},${UserArns}"
                    - RoleArn: !GetAtt MalwareRouterRole.Arn
                      UserArns: !Join [",", !Ref AuthorizedUserArns]

  # ----------------------------------------------------------
  # SNS TOPIC
  # ----------------------------------------------------------
  MalwareAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${Environment}-SFTP-Malware-Detected-Alert"

  MalwareAlertSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref MalwareAlertTopic
      Protocol: email
      Endpoint: !Ref AlertEmail

  # ----------------------------------------------------------
  # IAM ROLES
  # ----------------------------------------------------------

  # Lambda Execution Role
  MalwareRouterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Environment}-SFTP-Malware-Router-Role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub "${Environment}-SFTP-Lambda-Basic-Execution"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
        - PolicyName: !Sub "${Environment}-SFTP-File-Transfer-Policy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: AllowBucketListing
                Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource:
                  - !GetAtt InboundBucket.Arn
                  - !Sub "arn:aws:s3:::${CleanBucketName}"
                  - !GetAtt InfectedBucket.Arn
              - Sid: AllowFileOperations
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:DeleteObject
                  - s3:PutObjectTagging
                Resource:
                  - !Sub "${InboundBucket.Arn}/*"
                  - !Sub "arn:aws:s3:::${CleanBucketName}/*"
                  - !Sub "${InfectedBucket.Arn}/*"
              - Sid: SNSAlerts
                Effect: Allow
                Action: sns:Publish
                Resource: !Ref MalwareAlertTopic

  # SFTP User Role (Transfer Family)
  SFTPUserRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Environment}-SFTP-Transfer-Service-Role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: transfer.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub "${Environment}-SFTP-S3-Inbound-Access-Policy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: AllowOnlyPDFUploads
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectTagging
                Resource:
                  - !Sub "${InboundBucket.Arn}/healthworks/*/*.pdf"
                  - !Sub "${InboundBucket.Arn}/healthworks/*/*.PDF"
              - Sid: AllowUserFolderListing
                Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource: !GetAtt InboundBucket.Arn
              - Sid: AllowReadAccess
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                Resource: !Sub "${InboundBucket.Arn}/healthworks/*"

  # EventBridge Invoke Lambda Role
  EventBridgeInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Environment}-EventBridge-Invoke-SFTP-Lambda-Role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: TrustEventBridgeService
            Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Policies:
        - PolicyName: !Sub "${Environment}-EventBridge-Invoke-Lambda-Policy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt MalwareRouterFunction.Arn

  # ----------------------------------------------------------
  # LAMBDA FUNCTION
  # ----------------------------------------------------------
  MalwareRouterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-SFTP-Malware-Router"
      CodeUri: lambda/
      Handler: lambda_function.lambda_handler
      Role: !GetAtt MalwareRouterRole.Arn
      Environment:
        Variables:
          CLEAN_BUCKET: !Ref CleanBucketName
          INFECTED_BUCKET: !Ref InfectedBucket
          SNS_TOPIC_ARN: !Ref MalwareAlertTopic

  # ----------------------------------------------------------
  # EVENTBRIDGE RULE
  # ----------------------------------------------------------
  GuardDutyScanRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${Environment}-Trigger-SFTP-Malware-Router"
      State: ENABLED
      EventPattern:
        source:
          - aws.guardduty
        detail-type:
          - "GuardDuty Malware Protection Object Scan Result"
        detail:
          s3ObjectDetails:
            bucketName:
              - !Ref InboundBucket
      Targets:
        - Id: MalwareRouterLambda
          Arn: !GetAtt MalwareRouterFunction.Arn
          RoleArn: !GetAtt EventBridgeInvokeRole.Arn

  # Permission for EventBridge to invoke Lambda
  EventBridgeLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref MalwareRouterFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt GuardDutyScanRule.Arn

  # ----------------------------------------------------------
  # AWS TRANSFER FAMILY (SFTP SERVER)
  # ----------------------------------------------------------
  SFTPServer:
    Type: AWS::Transfer::Server
    Properties:
      EndpointType: PUBLIC
      IdentityProviderType: SERVICE_MANAGED
      Protocols:
        - SFTP
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-SFTP-Server"
        - Key: Environment
          Value: !Ref Environment

# ============================================================
# OUTPUTS
# ============================================================
Outputs:
  SFTPServerEndpoint:
    Description: SFTP Server endpoint for client connections
    Value: !Sub "${SFTPServer.ServerId}.server.transfer.${AWS::Region}.amazonaws.com"

  SFTPServerId:
    Description: Transfer Family Server ID (needed to add users)
    Value: !GetAtt SFTPServer.ServerId

  SFTPUserRoleArn:
    Description: Role ARN to assign when creating SFTP users
    Value: !GetAtt SFTPUserRole.Arn

  InboundBucketName:
    Description: S3 bucket where SFTP files land
    Value: !Ref InboundBucket

  InfectedBucketName:
    Description: S3 bucket for quarantined malware files
    Value: !Ref InfectedBucket

  LambdaFunctionArn:
    Description: Malware Router Lambda ARN
    Value: !GetAtt MalwareRouterFunction.Arn

  SNSTopicArn:
    Description: SNS topic for malware alerts
    Value: !Ref MalwareAlertTopic

  MalwareRouterRoleArn:
    Description: Lambda execution role ARN
    Value: !GetAtt MalwareRouterRole.Arn
